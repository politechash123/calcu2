<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>

    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <main><section class="root">
      <div class="view">

        <div class="toggle">

          <div class="theme" >
            <a href="index.html">White</a>
            <span>his</span>
          </div>
        </div>
        <div class="val">
          <span>1000*2/2*3</span>
        </div>
        

        <div class="value">
          
            <span>=</span>
            <span>2010</span>
        </div>

      </div>
    </section>

    <section class="root2">
      <div class="interact">
        <div class="numbers">

          
          <div class="action">
            
            
            <span>AC</span>
              <span>+/-</span>
              <span>%</span>
              
              
            </div>
          <div class="nums">
            <div class="num">1</div>
            <div class="num">2</div>
            <div class="num">3</div>
            <div class="num">4</div>
            <div class="num">5</div>
            <div class="num">6</div>
            <div class="num">7</div>
            <div class="num">8</div>
            <div class="num">9</div>
            <div class="num">.</div>
            <div class="num">0</div>
            <div class="num">00</div>

          </div>
          
          
        </div>
        
        <div class="operators">
        
          <div>/</div>
          <div>*</div>
          <div>-</div>
          <div>+</div>
          <div>=</div>
        </div>
      </div>
      
    </section>
  </main>
  
  
</body>
</html>
